<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Scrubber</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="wrapper">
    <video class="flex" width="765" height="430" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>
    <div class="progress__filled"></div>
    <button type="button" class="player__button toggle">►</button>
    <input type="range" name="volume" class="player__slider volume" min="0" max="1" step="0.05" value="1">
    <input type="range" name="playbackSpeed" class="player__slider playbackSpeed" min="0.5" max="2" step="0.1" value="1">
    <button type="button" class="player__button rewind" data-skip="-10">« 10s</button>
    <button type="button" class="player__button forward" data-skip="25">25s »</button>
  </div>

  <script>
  //Your code goes here
	const x=document.querySelector(".flex");
	const progress__filled = document.querySelector('.progress__filled');
	x.addEventListener('timeupdate', () => {
        const percent = (x.currentTime / x.duration) * 100;
        progress__filled.style.width = percent + '%';
    });
	progress__filled.style.height="50px";
	progress__filled.style.backgroundColor="blue";
     const player__button2=document.querySelector(".toggle");
	player__button2.addEventListener("click",toggle);
	function toggle(){
		if(x.paused)
		{
			x.play();
		}
		else{
			x.pause();
		}
	}
	  let volume1=document.querySelector(".volume");
	  volume1.addEventListener("input",event);
	  function event(e){
	  x.volume=e.target.value;
	}
	   
	  let volume2=document.querySelector(".playbackSpeed");
	  volume2.addEventListener("input",event1);
	  function event1(e){
	  x.playbackRate=e.target.value;
	}
	   
	  let z=document.querySelector(".rewind");
	  z.addEventListener("click",rewind_10s);
	  function rewind_10s(){
		  if(x.currentTime<10){
			  x.currentTime=0;
		  }
		  else{
		  x.currentTime-=10;
		  }
	      }
	  let a=document.querySelector(".forward")
	   a.addEventListener("click",forward_25s);
	  function forward_25s(){
		  
		  x.currentTime+=25;
	      }
</script>
</body>
</html>
